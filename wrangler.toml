name = "malgn-chatbot-api"
main = "src/index.js"
compatibility_date = "2024-01-01"

# Environment variables (non-sensitive)
[vars]
ENVIRONMENT = "development"

# Development environment
[env.dev]
name = "malgn-chatbot-api-dev"
vars = { ENVIRONMENT = "development" }

# Production environment
[env.production]
name = "malgn-chatbot-api-prod"
vars = { ENVIRONMENT = "production" }

# ============================================
# Cloudflare Bindings Configuration
# ============================================

# Workers AI (LLM and Embeddings) with AI Gateway
# AI Gateway provides logging, caching, and rate limiting
[ai]
binding = "AI"

[[ai.gateway]]
id = "malgn-chatbot"

# Vectorize (Vector Database for RAG)
# Create with: wrangler vectorize create malgn-chatbot-vectors --dimensions=1536 --metric=cosine
[[vectorize]]
binding = "VECTORIZE"
index_name = "malgn-chatbot-vectors"

# D1 Database (SQLite - Document metadata)
# Create with: wrangler d1 create malgn-chatbot-db
[[d1_databases]]
binding = "DB"
database_name = "malgn-chatbot-db"
database_id = "cafb4778-93be-4b85-ba19-78f6b7161f1d"

# KV Namespace (Cache and Session storage)
# Create with: wrangler kv namespace create "malgn-chatbot-kv"
[[kv_namespaces]]
binding = "KV"
id = "41fca93af7a84d53947590f5335caa0b"

# R2 Bucket (Original file storage)
# Create with: wrangler r2 bucket create malgn-chatbot-files
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "malgn-chatbot-files"

# ============================================
# Environment Variables
# ============================================
#
# LOCAL DEVELOPMENT (.dev.vars):
#   ENVIRONMENT=development
#
# PRODUCTION (Wrangler Secrets):
#   No secrets required for basic operation
#
# ============================================
# Setup Commands (Run once)
# ============================================
#
# 1. Create D1 database:
#    wrangler d1 create malgn-chatbot-db
#    -> Copy the database_id to this file
#
# 2. Create Vectorize index:
#    wrangler vectorize create malgn-chatbot-vectors --dimensions=1536 --metric=cosine
#
# 3. Create KV namespace:
#    wrangler kv namespace create "malgn-chatbot-kv"
#    -> Copy the id to this file
#
# 4. Create R2 bucket:
#    wrangler r2 bucket create malgn-chatbot-files
#
# 5. Apply D1 schema:
#    wrangler d1 execute malgn-chatbot-db --local --file=./schema.sql
#    wrangler d1 execute malgn-chatbot-db --file=./schema.sql  # for remote
