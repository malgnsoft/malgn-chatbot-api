# ============================================
# Malgn Chatbot API - Multi-tenant Configuration
# ============================================
#
# 구조: 하나의 코드베이스, 테넌트별 리소스 분리
# 배포: wrangler deploy --env <tenant_id>
#
# ============================================

name = "malgn-chatbot-api"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat_v2"]
account_id = "d2b8c5524b7259214fa302f1fecb4ad6"

# ============================================
# Local Development (기본 환경)
# wrangler dev 실행 시 사용
# ============================================

[vars]
ENVIRONMENT = "development"
TENANT_ID = "dev"

[ai]
binding = "AI"
gateway = { id = "malgn-chatbot", cache_ttl = 3600 }

[[d1_databases]]
binding = "D1_DB"
database_name = "malgn-chatbot-db"
database_id = "43ec4ff1-c894-43e0-bcee-2affef883e83"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "e72f917cd194472ca6f71f5e4186c3ca"

[[kv_namespaces]]
binding = "KV"
id = "fa3a96d4935841acb045a3b5116b5d6a"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "malgn-chatbot-files"

[[vectorize]]
binding = "VECTORIZE"
index_name = "malgn-chatbot-vectors"

# Queue
[[queues.producers]]
queue = "malgn-chatbot-queue"
binding = "QUEUE"

[[queues.consumers]]
queue = "malgn-chatbot-queue"
max_batch_size = 1
max_retries = 10
retry_delay = 10

# Cron Trigger (5분마다 비정상 상태 정리)
[triggers]
crons = ["*/5 * * * *"]

# ============================================
# Tenant: user1 (기존 리소스 사용)
# 배포: wrangler deploy --env user1
# URL: malgn-chatbot-api-user1.workers.dev
# ============================================

[env.user1]
name = "malgn-chatbot-api-user1"
vars = { ENVIRONMENT = "production", TENANT_ID = "user1" }

[env.user1.ai]
binding = "AI"
gateway = { id = "malgn-chatbot", cache_ttl = 3600 }

[[env.user1.d1_databases]]
binding = "D1_DB"
database_name = "malgn-chatbot-db"
database_id = "43ec4ff1-c894-43e0-bcee-2affef883e83"

[[env.user1.hyperdrive]]
binding = "HYPERDRIVE"
id = "e72f917cd194472ca6f71f5e4186c3ca"

[[env.user1.kv_namespaces]]
binding = "KV"
id = "fa3a96d4935841acb045a3b5116b5d6a"

[[env.user1.r2_buckets]]
binding = "BUCKET"
bucket_name = "malgn-chatbot-files"

[[env.user1.vectorize]]
binding = "VECTORIZE"
index_name = "malgn-chatbot-vectors"

[[env.user1.queues.producers]]
queue = "malgn-chatbot-queue"
binding = "QUEUE"

# consumer는 default Worker에서 처리 (Queue당 consumer 1개 제한)
# cron도 default Worker에서 처리

# ============================================
# Tenant: user2
# 배포: wrangler deploy --env user2
# URL: malgn-chatbot-api-user2.workers.dev
# ============================================

[env.user2]
name = "malgn-chatbot-api-user2"
vars = { ENVIRONMENT = "production", TENANT_ID = "user2" }

[env.user2.ai]
binding = "AI"
gateway = { id = "malgn-chatbot", cache_ttl = 3600 }

[[env.user2.d1_databases]]
binding = "D1_DB"
database_name = "malgn-chatbot-db-user2"
database_id = "e18e63b7-a10e-4c41-b40d-bb62d6cc3deb"

[[env.user2.kv_namespaces]]
binding = "KV"
id = "720bdf6a21524611a06d817ed63b9092"

[[env.user2.r2_buckets]]
binding = "BUCKET"
bucket_name = "malgn-chatbot-files-user2"

[[env.user2.vectorize]]
binding = "VECTORIZE"
index_name = "malgn-chatbot-vectors-user2"

[[env.user2.queues.producers]]
queue = "malgn-chatbot-queue-user2"
binding = "QUEUE"

[[env.user2.queues.consumers]]
queue = "malgn-chatbot-queue-user2"
max_batch_size = 1
max_retries = 3

[env.user2.triggers]
crons = ["*/5 * * * *"]

# ============================================
# 새 테넌트 추가 방법
# ============================================
#
# 1. Cloudflare 리소스 생성:
#    wrangler d1 create malgn-chatbot-db-<tenant_id>
#    wrangler kv namespace create malgn-chatbot-kv-<tenant_id>
#    wrangler r2 bucket create malgn-chatbot-files-<tenant_id>
#    wrangler vectorize create malgn-chatbot-vectors-<tenant_id> --dimensions=1024 --metric=cosine
#
# 2. 위 템플릿을 복사하여 [env.<tenant_id>] 섹션 추가
#    - 생성된 리소스 ID를 해당 섹션에 입력
#    - AI Gateway 설정 포함:
#      [env.<tenant_id>.ai]
#      binding = "AI"
#      gateway = { id = "malgn-chatbot", cache_ttl = 3600 }
#
# 3. D1 스키마 적용:
#    wrangler d1 execute malgn-chatbot-db-<tenant_id> --file=./schema.sql
#
# 4. 시크릿 설정:
#    wrangler secret put OPENAI_API_KEY --env <tenant_id>
#
# 5. 배포:
#    wrangler deploy --env <tenant_id>
#
# ============================================
